name: complete_workflow

on:
  pull_request:

jobs:
  secrets_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.changes.outputs.python }}
      k8s: ${{ steps.changes.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
              - 'backend/**'
              - 'tests/**'
              - 'requirements.txt'
            k8s:
              - 'k8s/**'

  check_python:
    runs-on: ubuntu-latest
    needs: [secrets_check, detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    container:
      image: python:alpine3.21
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apk add --no-cache gcc musl-dev libffi-dev
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Pytest
        run: pytest --cov --cov-report=term-missing

      - name: Run Python Security check
        run: bandit -r backend/

      - name: Run mypy Static analisys
        run: mypy backend/ --explicit-package-bases

  check_k8s:
    runs-on: ubuntu-latest
    needs: [secrets_check, detect-changes]
    if: needs.detect-changes.outputs.k8s == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
      - name: Validate k8s manifests
        run: |
          kubeconform -strict -summary \
            k8s/namespace.yaml \
            k8s/ingress.yaml \
            k8s/backend/ \
            k8s/frontend/
